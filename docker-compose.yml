services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/openclaw.Dockerfile
    image: althea-openclaw:local
    restart: unless-stopped
    env_file:
      - .env
      - ${OPENCLAW_GATEWAY_ENV_FILE:-/opt/althea/runtime/openclaw.env}
      - ${GITHUB_ENV_FILE:-/opt/althea/runtime/github.env}
      - ${TELEGRAM_ENV_FILE:-/opt/althea/runtime/telegram.env}
      - ${INFERENCE_ENV_FILE:-/opt/althea/runtime/inference.env}
      - ${CLAUDE_CODE_ENV_FILE:-/opt/althea/runtime/claude-code.env}
    environment:
      OPENCLAW_CONFIG_PATH: /srv/openclaw/openclaw.json
      OPENCLAW_HOME: /root/.openclaw
    command:
      - gateway
      - --bind
      - ${OPENCLAW_GATEWAY_BIND:-lan}
      - --port
      - "${OPENCLAW_GATEWAY_PORT:-18789}"
    ports:
      - "${OPENCLAW_BIND_HOST:-0.0.0.0}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - ./openclaw:/srv/openclaw
      - ${OPENCLAW_HOME_DIR:-./openclaw/home}:/root/.openclaw

  openclaw-cli:
    image: althea-openclaw:local
    profiles:
      - tools
    env_file:
      - .env
      - ${OPENCLAW_GATEWAY_ENV_FILE:-/opt/althea/runtime/openclaw.env}
      - ${GITHUB_ENV_FILE:-/opt/althea/runtime/github.env}
      - ${TELEGRAM_ENV_FILE:-/opt/althea/runtime/telegram.env}
      - ${INFERENCE_ENV_FILE:-/opt/althea/runtime/inference.env}
      - ${CLAUDE_CODE_ENV_FILE:-/opt/althea/runtime/claude-code.env}
    environment:
      OPENCLAW_CONFIG_PATH: /srv/openclaw/openclaw.json
      OPENCLAW_HOME: /root/.openclaw
    entrypoint:
      - openclaw
    volumes:
      - ./openclaw:/srv/openclaw
      - ${OPENCLAW_HOME_DIR:-./openclaw/home}:/root/.openclaw
