# cloudbuild.yaml
# Cloud Build configuration for Althea
# Builds Docker image and pushes to Artifact Registry
# Then (optionally) deploys to Cloud Run

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-f'
      - 'docker/openclaw.Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'

  # Step 3: (Optional) Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: deploy
    args:
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}'
      - '--allow-unauthenticated'
      - '--port=18789'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'

# Images built
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:latest'

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'

# Timeout (in seconds) - adjust as needed
timeout: '3600s'

# Substitutions (provide via --substitutions or use defaults)
substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REPO: 'docker'
  _IMAGE_NAME: 'althea'
  _SERVICE_NAME: 'althea'
  _SERVICE_ACCOUNT: 'althea-cloudrun@${PROJECT_ID}.iam.gserviceaccount.com'

# Only enable Step 3 (deploy) if you want auto-deployment on push
# Remove the 'deploy' step to just build and push
# Then deploy manually when ready
